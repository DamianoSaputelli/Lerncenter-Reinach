<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lerncenter Reinach – Theorie</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/flowbite@2.2.0/dist/flowbite.min.js"></script>
</head>

<body class="bg-white dark:bg-gray-900 dark:text-white flex flex-col min-h-screen">

  <div class="main-content section mt-24 py-16 ml-5 mr-5 flex-grow">
    <div class="w-full max-w-7xl mx-auto flex flex-col gap-12">

      <div class="flex flex-col md:flex-row">
        <div class="flex-1 p-12 bg-blue-100 border border-blue-500 rounded-3xl shadow-2xl">
          <section>
            <h1 class="text-4xl font-extrabold text-blue-500">Theorie</h1>
            <p class="text-xl text-gray-700 leading-relaxed mt-4">
              Gerne unterstützen wir Sie bei der Vorbereitung auf die Theorieprüfung.
              <br>
              Die Theoriekurse werden individuell gestaltet und nach ihren Bedürfnissen angepasst.
            </p>
          </section>
        </div>
      </div>
    </div>
  </div>

  <div id="nav-placeholder"></div>

  <footer>
    <div id="footer-placeholder"></div>

    <script>
      fetch("_foot.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("footer-placeholder").innerHTML = data;
        });
    </script>
  </footer>

  <script>
    fetch('_nav.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data;

        const toggleBtn = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const closeBtn = document.getElementById('sidebar-close');

        toggleBtn?.addEventListener('click', () => {
          sidebar.classList.remove('translate-x-full');
          overlay.classList.remove('hidden');
        });

        closeBtn?.addEventListener('click', closeSidebar);
        overlay?.addEventListener('click', closeSidebar);

        function closeSidebar() {
          sidebar.classList.add('translate-x-full');
          overlay.classList.add('hidden');
        }
      });
  </script>

</body>

</html>
